steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'daily-learning'
      - '--source=.'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=GROQ_API_KEY=${_GROQ_API_KEY},GROQ_MODEL=${_GROQ_MODEL},SMTP_HOST=${_SMTP_HOST},SMTP_PORT=${_SMTP_PORT},SMTP_USER=${_SMTP_USER},SMTP_PASSWORD=${_SMTP_PASSWORD},EMAIL_TO=${_EMAIL_TO},VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY},VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY},ADMIN_KEY=${_ADMIN_KEY},APP_URL=https://daily-learning-taxnvq53va-uc.a.run.app,DATABASE_URL=sqlite:////app/data/topics.db'
      - '--add-volume=name=sqlite-data,type=cloud-storage,bucket=my-stuff-ai-db-data'
      - '--add-volume-mount=volume=sqlite-data,mount-path=/app/data'
      - '--execution-environment=gen2'
      - '--concurrency=50'
      - '--quiet'

substitutions:
  _GROQ_MODEL: gpt-oss-120b
  _SMTP_PORT: '587'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
