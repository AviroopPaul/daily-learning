<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Learning Quiz Guard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <span class="popup-logo">daily_learning</span>
    </div>

    <div class="popup-status" id="status-area">
      <div class="status-icon" id="status-icon">⏳</div>
      <div class="status-text" id="status-text">Checking quiz status…</div>
    </div>

    <div class="popup-streak" id="streak-area" style="display:none">
      <span class="streak-icon">⚡</span>
      <span id="streak-label">0 day streak</span>
    </div>

    <a class="popup-btn" id="open-app-btn" href="#" target="_blank">
      Open Daily Learning
    </a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
